<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="user-scalable=no, initial-scale=1.0">
    <title>Arrival Support</title>

    <link rel="stylesheet" type="text/css" href="../css/arrival.css">
    <script src="/libs/qi/2/qi.js"></script>
    <script src="../js/jquery.js"></script>
    <script src="../js/qievents.js"></script>
    <script src="../js/arrival.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body>
    <div id="wrapper">
        <div id="top-bar"></div>

        <div id="container">
            <p id="event-label">USEK GRADUATION CEREMONY 2026</p>
            <div class="divider"><span>✦</span></div>

            <p id="intro-label">Guest &amp; Staff Assistance</p>

            <h1 id="question-text">Loading...</h1>

            <p id="pepper-speech" class="hidden"></p>

            <img id="map-display" class="hidden" src="../pics/seating_map.png" alt="Seating map">

            <div class="divider"><span>✦</span></div>

            <div id="button-container">
                <div id="group-yes-no" class="button-group hidden">
                    <button class="btn btn-yes" onclick="raiseConfirmationEvent('yesAnswer')">Yes, indeed!</button>
                    <button class="btn btn-no" onclick="raiseConfirmationEvent('noAnswer')">No, thank you</button>
                </div>

                <div id="group-role" class="button-group hidden">
                    <button class="btn btn-staff" onclick="raiseConfirmationEvent('staffAnswer')">I am Staff</button>
                    <button class="btn btn-guest" onclick="raiseConfirmationEvent('guestAnswer')">I am a Guest</button>
                </div>
            </div>
        </div>
    </div>

    <script type="text/javascript">
        window.addEventListener("DOMContentLoaded", function () {
            displayPageInformation();
            updateQuestionState();
            subscribeToTabletAnswerEvents();
        });
    </script>
</body>
</html>
